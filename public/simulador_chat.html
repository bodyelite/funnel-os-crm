<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #2563eb;
  --accent-dark: #1d4ed8;
  --bg-deep: #0b1220;

  --chat-bg: #e7e1d8;
  --chat-pattern: #d9d2c5;
  --bubble-bot: #ffffff;
  --bubble-user: #d9fdd3;
  --bubble-user-dark: #a7e6a3;

  --text: #111b21;
  --text-soft: #54656f;
  --text-mute: #8696a0;
  --border: rgba(0, 0, 0, 0.08);

  --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

.stage {
  min-height: 100vh;
  background:
    radial-gradient(circle at 20% 20%, color-mix(in srgb, var(--accent) 35%, transparent) 0%, transparent 45%),
    radial-gradient(circle at 80% 80%, color-mix(in srgb, var(--accent-dark) 28%, transparent) 0%, transparent 50%),
    linear-gradient(135deg, var(--bg-deep) 0%, #0f172a 100%);
  display: grid;
  place-items: center;
  padding: 24px 16px;
  position: relative;
  overflow: hidden;
}

.stage::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

.brand-watermark {
  position: absolute;
  top: 24px;
  left: 32px;
  color: rgba(255, 255, 255, 0.55);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 2;
}
.brand-watermark .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
}

.phone {
  width: 100%;
  max-width: 400px;
  height: min(720px, 92vh);
  background: var(--chat-bg);
  border-radius: 28px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow:
    0 30px 60px rgba(0, 0, 0, 0.45),
    0 8px 20px rgba(0, 0, 0, 0.25),
    inset 0 0 0 1px rgba(255, 255, 255, 0.05);
  position: relative;
  z-index: 1;
}

.phone::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle at 1px 1px, var(--chat-pattern) 1px, transparent 1px);
  background-size: 16px 16px;
  opacity: 0.5;
  pointer-events: none;
  z-index: 0;
}

.phone-header {
  background: var(--accent);
  color: #fff;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: relative;
  z-index: 2;
  flex-shrink: 0;
}
.phone-header .back {
  font-size: 20px;
  opacity: 0.9;
  width: 24px;
  text-align: center;
}
.phone-header .pic {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.18);
  display: grid;
  place-items: center;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.02em;
  flex-shrink: 0;
}
.phone-header .info { flex: 1; min-width: 0; }
.phone-header .name {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.phone-header .status {
  font-size: 11.5px;
  opacity: 0.85;
  display: flex;
  align-items: center;
  gap: 5px;
}
.phone-header .status::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #4ade80;
  box-shadow: 0 0 6px #4ade80;
}
.phone-header .icons {
  display: flex;
  gap: 18px;
  font-size: 16px;
  opacity: 0.9;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: relative;
  z-index: 1;
  scrollbar-width: thin;
  scrollbar-color: rgba(0, 0, 0, 0.15) transparent;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.15); border-radius: 4px; }

.day-divider {
  align-self: center;
  background: rgba(255, 255, 255, 0.85);
  color: var(--text-soft);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  margin: 8px 0;
  box-shadow: 0 1px 0.5px rgba(0, 0, 0, 0.13);
}

.bubble {
  max-width: 78%;
  padding: 7px 10px 8px;
  border-radius: 8px;
  font-size: 14px;
  line-height: 1.4;
  position: relative;
  box-shadow: 0 1px 0.5px rgba(0, 0, 0, 0.13);
  word-wrap: break-word;
  animation: pop 220ms ease-out;
}
@keyframes pop {
  from { opacity: 0; transform: translateY(4px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.bubble.bot {
  align-self: flex-start;
  background: var(--bubble-bot);
  border-top-left-radius: 2px;
}
.bubble.user {
  align-self: flex-end;
  background: var(--bubble-user);
  border-top-right-radius: 2px;
}

.bubble .time {
  font-size: 10.5px;
  color: var(--text-mute);
  display: inline-flex;
  align-items: center;
  gap: 3px;
  margin-left: 8px;
  float: right;
  margin-top: 4px;
  margin-bottom: -2px;
  position: relative;
  top: 2px;
}
.bubble.user .time::after {
  content: '✓✓';
  color: #53bdeb;
  font-size: 11px;
  margin-left: 2px;
}

.typing {
  align-self: flex-start;
  background: var(--bubble-bot);
  padding: 10px 14px;
  border-radius: 8px;
  border-top-left-radius: 2px;
  display: flex;
  gap: 4px;
  box-shadow: 0 1px 0.5px rgba(0, 0, 0, 0.13);
}
.typing span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text-mute);
  animation: blink 1.2s infinite ease-in-out;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
  30% { opacity: 1; transform: translateY(-2px); }
}

.composer {
  padding: 8px;
  background: #f0f2f5;
  display: flex;
  align-items: flex-end;
  gap: 6px;
  position: relative;
  z-index: 2;
  flex-shrink: 0;
}
.composer .input-wrap {
  flex: 1;
  background: #fff;
  border-radius: 22px;
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 40px;
}
.composer .input-wrap input {
  flex: 1;
  border: none;
  outline: none;
  font-family: inherit;
  font-size: 14px;
  color: var(--text);
  background: transparent;
  padding: 4px 0;
}
.composer .input-wrap input::placeholder { color: var(--text-mute); }
.composer .icon-btn {
  color: var(--text-mute);
  font-size: 18px;
  padding: 6px;
}
.composer .send-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: grid;
  place-items: center;
  font-size: 18px;
  cursor: pointer;
  border: none;
  flex-shrink: 0;
  transition: transform var(--transition), background var(--transition);
}
.composer .send-btn:hover { background: var(--accent-dark); }
.composer .send-btn:active { transform: scale(0.94); }
.composer .send-btn:disabled { background: #cfd8df; cursor: default; }

.toast {
  position: absolute;
  bottom: 84px;
  left: 50%;
  transform: translate(-50%, 8px);
  background: rgba(15, 23, 42, 0.95);
  color: #fff;
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  transition: opacity 220ms, transform 220ms;
  z-index: 5;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translate(-50%, 0); }
.toast::before {
  content: '✓';
  display: inline-block;
  margin-right: 6px;
  color: #4ade80;
  font-weight: 700;
}

.error-banner {
  background: #fee2e2;
  color: #991b1b;
  padding: 10px 16px;
  font-size: 12.5px;
  text-align: center;
}

@media (max-width: 480px) {
  .stage { padding: 0; }
  .phone {
    max-width: none;
    height: 100vh;
    border-radius: 0;
    box-shadow: none;
  }
  .brand-watermark { display: none; }
}
</style>
</head>
<body>

<div class="stage">
  <div class="brand-watermark">
    <span class="dot"></span>
    <span>Powered by FunnelOS</span>
  </div>

  <div class="phone">
    <div class="phone-header">
      <span class="back">‹</span>
      <div class="pic" id="hPic">A</div>
      <div class="info">
        <div class="name" id="hName">Asistente</div>
        <div class="status">en línea</div>
      </div>
      <div class="icons"><span>📹</span><span>📞</span><span>⋮</span></div>
    </div>

    <div class="messages" id="messages">
      <div class="day-divider">Hoy</div>
    </div>

    <div class="toast" id="toast">Te hemos registrado</div>

    <div class="composer">
      <div class="input-wrap">
        <span class="icon-btn">😊</span>
        <input type="text" id="msgInput" placeholder="Escribe un mensaje..." autocomplete="off">
        <span class="icon-btn">📎</span>
      </div>
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const tenant = params.get('empresa') || params.get('tenant') || 'demo_automotora';
const sessionId = 's_' + Math.random().toString(36).slice(2) + '_' + Date.now();

const messagesEl = document.getElementById('messages');
const input = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const toast = document.getElementById('toast');
const hName = document.getElementById('hName');
const hPic = document.getElementById('hPic');

let busy = false;

function hexToSoft(hex, alpha = 0.3) {
  const h = hex.replace('#', '');
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function darken(hex, amt = 0.2) {
  const h = hex.replace('#', '');
  let r = parseInt(h.substring(0, 2), 16);
  let g = parseInt(h.substring(2, 4), 16);
  let b = parseInt(h.substring(4, 6), 16);
  r = Math.max(0, Math.floor(r * (1 - amt)));
  g = Math.max(0, Math.floor(g * (1 - amt)));
  b = Math.max(0, Math.floor(b * (1 - amt)));
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

function nowTime() {
  const d = new Date();
  return d.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });
}

function escapeHTML(s) {
  return s.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
}

function addBubble(text, who) {
  const div = document.createElement('div');
  div.className = 'bubble ' + who;
  div.innerHTML = `${escapeHTML(text)}<span class="time">${nowTime()}</span>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2400);
}

async function cargarConfig() {
  try {
    const r = await fetch('/api/config?tenant=' + encodeURIComponent(tenant));
    const cfg = await r.json();
    const accent = cfg.accentColor || '#2563eb';
    document.documentElement.style.setProperty('--accent', accent);
    document.documentElement.style.setProperty('--accent-dark', darken(accent, 0.18));
    hName.textContent = cfg.businessName || 'Asistente';
    hPic.textContent = (cfg.businessName || 'A').charAt(0).toUpperCase();
    document.title = cfg.businessName || 'Chat';

    const botR = await fetch('/api/bot?tenant=' + encodeURIComponent(tenant));
    const bot = await botR.json();
    setTimeout(() => {
      showTyping();
      setTimeout(() => {
        hideTyping();
        addBubble(bot.greeting || '¡Hola! ¿En qué puedo ayudarte?', 'bot');
      }, 900);
    }, 400);
  } catch (e) {
    addBubble('No se pudo cargar la configuración. Revisa la URL.', 'bot');
  }
}

async function enviar() {
  const text = input.value.trim();
  if (!text || busy) return;
  busy = true;
  sendBtn.disabled = true;
  addBubble(text, 'user');
  input.value = '';
  showTyping();

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Tenant-Id': tenant },
      body: JSON.stringify({ sessionId, message: text, tenant })
    });
    const data = await r.json();
    setTimeout(() => {
      hideTyping();
      addBubble(data.reply, 'bot');
      if (data.leadCaptured) showToast('Te hemos registrado, un asesor se contactará pronto');
      busy = false;
      sendBtn.disabled = false;
      input.focus();
    }, 700);
  } catch (e) {
    hideTyping();
    addBubble('Error de conexión. Inténtalo nuevamente.', 'bot');
    busy = false;
    sendBtn.disabled = false;
  }
}

sendBtn.addEventListener('click', enviar);
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    enviar();
  }
});

cargarConfig();
input.focus();
</script>
</body>
</html>
