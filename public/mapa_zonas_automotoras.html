<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zonas — Compraventa Autos Santiago</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;
  --white:#ffffff;
  --surface:#f0efe9;
  --border:#e2e0d8;
  --border2:#ccc9bc;
  --text:#1a1a18;
  --muted:#6b6a62;
  --faint:#9e9d94;
  --sidebar:380px;
}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
.shell{display:flex;height:100vh}

/* ─ SIDEBAR ─ */
.sidebar{
  width:var(--sidebar);min-width:var(--sidebar);
  height:100%;background:var(--white);
  display:flex;flex-direction:column;
  border-right:1px solid var(--border);
  z-index:10;
}
.sidebar-top{padding:16px 16px 0}
.app-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.app-logo{
  width:36px;height:36px;border-radius:10px;
  background:#1a1a18;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.app-title{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--text);line-height:1.2}
.app-sub{font-size:11px;color:var(--muted)}

.search-wrap{
  display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:22px;padding:9px 14px;margin-bottom:12px;
}
.search-wrap svg{flex-shrink:0;color:var(--muted)}
.search-wrap input{background:none;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);flex:1}
.search-wrap input::placeholder{color:var(--faint)}

.filter-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}
.filter-scroll::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;font-size:11px;font-weight:500;
  padding:5px 13px;border-radius:20px;
  border:1px solid var(--border2);cursor:pointer;
  color:var(--muted);background:var(--white);
  transition:all .18s;white-space:nowrap;
}
.chip:hover{border-color:var(--text);color:var(--text)}
.chip.on{background:var(--text);border-color:var(--text);color:#fff}

.result-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 16px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  background:var(--surface);
}
.result-bar span{font-size:11px;color:var(--muted)}
.result-bar strong{font-size:11px;font-weight:600;color:var(--text)}

/* ─ LIST ─ */
.list{flex:1;overflow-y:auto;padding:8px 0}
.list::-webkit-scrollbar{width:3px}
.list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.zona-item{
  display:flex;gap:12px;align-items:flex-start;
  padding:13px 16px;cursor:pointer;
  border-bottom:1px solid var(--border);
  transition:background .15s;
  position:relative;
}
.zona-item:hover{background:var(--surface)}
.zona-item.active{background:#fffbf0;border-left:3px solid #000}
.zona-item.active .zi-letter{transform:scale(1.08)}

.zi-letter{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
  color:#fff;flex-shrink:0;margin-top:2px;
  transition:transform .2s;
  box-shadow:0 2px 6px rgba(0,0,0,.18);
}

.zi-body{flex:1;min-width:0}
.zi-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1px;line-height:1.3}
.zi-addr{font-size:11px;color:var(--muted);margin-bottom:6px;line-height:1.4}

.zi-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.score-badge{
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  padding:2px 8px;border-radius:10px;
}
.comp-badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px}

.zi-actions{display:flex;gap:6px;margin-top:8px}
.zi-btn{
  display:flex;align-items:center;gap:4px;
  font-size:11px;color:var(--muted);
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:4px 10px;cursor:pointer;
  transition:all .15s;
}
.zi-btn:hover{background:var(--border);color:var(--text)}
.zi-btn svg{width:11px;height:11px}

/* ─ EXPANDED DETAIL ─ */
.zona-detail{
  display:none;padding:0 16px 14px 58px;
  border-bottom:1px solid var(--border);
  background:#fffbf0;
}
.zona-item.active + .zona-detail{display:block}

.detail-section{margin-bottom:10px}
.detail-title{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.detail-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:8px}

.comp-list{display:flex;flex-direction:column;gap:5px}
.comp-row{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--white);border:1px solid var(--border);
  border-radius:8px;padding:7px 10px;font-size:12px;
}
.comp-row-name{font-weight:500;color:var(--text)}
.comp-row-right{display:flex;align-items:center;gap:8px}
.comp-stars{color:#f59e0b;font-size:10px}
.comp-rating{font-size:11px;font-weight:600;color:var(--text)}
.comp-tag{font-size:10px;padding:1px 7px;border-radius:8px;font-weight:500}
.no-comp{
  display:flex;align-items:center;gap:8px;
  background:#f0fdf4;border:1px solid #bbf7d0;
  border-radius:8px;padding:8px 10px;
  font-size:12px;color:#166534;font-weight:500;
}

.stat-row{display:flex;gap:8px;margin-bottom:10px}
.stat-box{
  flex:1;background:var(--white);border:1px solid var(--border);
  border-radius:8px;padding:8px 10px;text-align:center;
}
.stat-num{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--text);line-height:1}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px}

/* ─ MAP ─ */
.map-wrap{flex:1;position:relative}
#map{width:100%;height:100%}
.leaflet-container{font-family:'DM Sans',sans-serif}

/* ─ POPUP OVERLAY ─ */
.map-popup{
  position:absolute;bottom:20px;right:16px;
  width:270px;
  background:var(--white);
  border:1px solid var(--border);
  border-radius:16px;padding:16px;
  z-index:999;
  box-shadow:0 8px 32px rgba(0,0,0,.12);
  display:none;
  animation:popIn .2s ease;
}
@keyframes popIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.map-popup.vis{display:block}
.mp-close{
  position:absolute;top:10px;right:10px;
  width:22px;height:22px;border-radius:50%;
  background:var(--surface);border:1px solid var(--border);
  cursor:pointer;font-size:12px;color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.mp-close:hover{background:var(--border)}
.mp-letter{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;
  color:#fff;flex-shrink:0;margin-bottom:8px;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
}
.mp-name{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;margin-bottom:2px}
.mp-addr{font-size:11px;color:var(--muted);margin-bottom:10px}
.mp-stat{display:flex;justify-content:space-between;font-size:11px;padding:5px 0;border-bottom:1px solid var(--border)}
.mp-stat:last-of-type{border-bottom:none}
.mp-sl{color:var(--muted)}
.mp-sv{font-weight:500}
.mp-note{
  margin-top:8px;font-size:11px;color:var(--muted);line-height:1.55;
  background:var(--surface);border-radius:8px;padding:8px 10px;
}

/* ─ MAP HEADER STATS ─ */
.map-header{
  position:absolute;top:12px;left:12px;
  background:var(--white);border:1px solid var(--border);
  border-radius:12px;padding:10px 14px;z-index:800;
  display:flex;gap:12px;align-items:center;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}
.mh-stat{text-align:center}
.mh-num{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;line-height:1}
.mh-lbl{font-size:10px;color:var(--muted);margin-top:1px}
.mh-div{width:1px;height:28px;background:var(--border)}

/* ─ LEGEND ─ */
.legend{
  position:absolute;bottom:12px;left:12px;
  background:var(--white);border:1px solid var(--border);
  border-radius:12px;padding:10px 14px;z-index:800;
  font-size:11px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}
.leg-title{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.leg-row{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.leg-row:last-child{margin-bottom:0}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
</style>
</head>
<body>
<div class="shell">

<!-- ═══ SIDEBAR ═══ -->
<aside class="sidebar">
  <div class="sidebar-top">
    <div class="app-row">
      <div class="app-logo">🚗</div>
      <div>
        <div class="app-title">Zonas Estratégicas — Santiago</div>
        <div class="app-sub">Compraventa autos $8–40M · 6 sectores analizados</div>
      </div>
    </div>

    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Buscar zona o sector...">
    </div>

    <div class="filter-scroll">
      <button class="chip on" onclick="setFilter('all',this)">Todas las zonas</button>
      <button class="chip" onclick="setFilter('91',this)">⭐ Score 90+</button>
      <button class="chip" onclick="setFilter('baja',this)">Competencia baja</button>
      <button class="chip" onclick="setFilter('media',this)">Competencia media</button>
      <button class="chip" onclick="setFilter('arriendo',this)">Arriendo bajo</button>
    </div>
  </div>

  <div class="result-bar">
    <span>Zonas encontradas</span>
    <strong id="countLbl">6 resultados</strong>
  </div>

  <div class="list" id="zonaList"></div>
</aside>

<!-- ═══ MAP ═══ -->
<div class="map-wrap">
  <div id="map"></div>

  <div class="map-header">
    <div class="mh-stat"><div class="mh-num" style="color:#16a34a">3</div><div class="mh-lbl">Oportunidad alta</div></div>
    <div class="mh-div"></div>
    <div class="mh-stat"><div class="mh-num" style="color:#ca8a04">2</div><div class="mh-lbl">Oportunidad media</div></div>
    <div class="mh-div"></div>
    <div class="mh-stat"><div class="mh-num" style="color:#dc2626">1</div><div class="mh-lbl">Evitar</div></div>
  </div>

  <div class="legend">
    <div class="leg-title">Score de oportunidad</div>
    <div class="leg-row"><div class="leg-dot" style="background:#16a34a"></div><span>Alta (80–91)</span></div>
    <div class="leg-row"><div class="leg-dot" style="background:#ca8a04"></div><span>Media (74–79)</span></div>
    <div class="leg-row"><div class="leg-dot" style="background:#dc2626"></div><span>Saturada / Evitar</span></div>
  </div>

  <div class="map-popup" id="mapPopup">
    <button class="mp-close" onclick="closePopup()">✕</button>
    <div id="mp-content"></div>
  </div>
</div>
</div>

<script>
// ══════════════════════════════════════════════
//  DATOS — 6 ZONAS DEL ANÁLISIS ORIGINAL
// ══════════════════════════════════════════════
const ZONAS = [
  {

    comp: 'Baja',

    perfil: 'Clase media, trabajadores, familias',
    score_txt: '91/100',
    color: '#16a34a',
    colorFill: '#16a34a',
    desc: 'Corredor industrial en expansión, bajo número de competidores directos, alta conectividad y terrenos amplios disponibles. Zona de máxima oportunidad.',
    competidores: [
      { name: 'Autocenter Quilicura', rating: 3.7, reviews: 389, tag: 'Fraudes documentales', tagColor: '#dc2626' },
      { name: 'Automotriz Vespucio Norte', rating: 2.9, reviews: 19, tag: 'Muy mal servicio', tagColor: '#dc2626' },
      { name: 'Automóviles Rivera', rating: 5.0, reviews: 3, tag: 'Actor marginal', tagColor: '#16a34a' },
    ],
    stats: [

    ],
    ideal: true,
  },
  {
    id: 'B',
    name: 'Maipú (sector poniente)',
    sub: 'Av. Pajaritos / Américo Vespucio',
    lat: -33.510, lng: -70.758,
    radius: 2500,
    score: 87,
    oportunidad: 'alta',
    comp: 'Media-baja',
    arriendo: '$4–6M',
    perfil: 'Clase media, familias numerosas',
    score_txt: '87/100',
    color: '#16a34a',
    colorFill: '#16a34a',
    desc: 'Mayor densidad poblacional de Santiago. Alta demanda de autos económicos $8–20M. Clientela masiva y recurrente. Varios actores pero sin dominio claro.',
    competidores: [
      { name: 'Autoplaza Maipú', rating: 3.8, reviews: 210, tag: 'Competencia media', tagColor: '#ca8a04' },
      { name: 'Dercocenter Maipú', rating: 4.1, reviews: 890, tag: 'Autos nuevos', tagColor: '#ca8a04' },
    ],
    stats: [
      { label: 'Flujo vehicular', val: '88%' },
      { label: 'Costo arriendo', val: '$4–6M' },
      { label: 'Densidad poblacional', val: 'Muy alta' },
    ],
    ideal: false,
  },
  {
    id: 'C',
    name: 'Pudahuel',
    sub: 'Av. El Sol / Ruta 68',
    lat: -33.430, lng: -70.810,
    radius: 2000,
    score: 84,
    oportunidad: 'alta',
    comp: 'Baja',
    arriendo: '$2.5–4M',
    perfil: 'Clase media-baja, trabajadores',
    score_txt: '84/100',
    color: '#16a34a',
    colorFill: '#16a34a',
    desc: 'Zona aeroportuaria en plena expansión urbana. Arriendos muy bajos, casi sin competencia formal. Clientela emergente que compra su primer auto.',
    competidores: [],
    stats: [
      { label: 'Flujo vehicular', val: '80%' },
      { label: 'Costo arriendo', val: '$2.5–4M' },
      { label: 'Competidores formales', val: 'Casi ninguno' },
    ],
    ideal: false,
  },
  {
    id: 'D',
    name: 'Conchalí / Recoleta',
    sub: 'Av. Independencia / El Salto',
    lat: -33.375, lng: -70.655,
    radius: 1600,
    score: 82,
    oportunidad: 'alta',
    comp: 'Baja',
    arriendo: '$3–5M',
    perfil: 'Clase media, comerciantes, profesionales',
    score_txt: '82/100',
    color: '#16a34a',
    colorFill: '#16a34a',
    desc: 'Sector con alta circulación pero pocos actores formales en compraventa. Cercanía con Américo Vespucio y vías rápidas. Buen acceso desde el centro.',
    competidores: [
      { name: 'Movicenter (borde)', rating: 4.2, reviews: 11022, tag: 'Cluster cercano', tagColor: '#dc2626' },
      { name: 'Automotora Guillermo Morales', rating: 4.0, reviews: 423, tag: 'Quejas postventa', tagColor: '#ca8a04' },
    ],
    stats: [
      { label: 'Flujo vehicular', val: '78%' },
      { label: 'Costo arriendo', val: '$3–5M' },
      { label: 'Acceso metro/bus', val: 'Muy bueno' },
    ],
    ideal: false,
  },
  {
    id: 'E',
    name: 'Peñaflor / Talagante',
    sub: 'Av. Ortúzar / Ruta 78',
    lat: -33.615, lng: -70.890,
    radius: 2800,
    score: 80,
    oportunidad: 'alta',
    comp: 'Muy baja',
    arriendo: '$1.5–3M',
    perfil: 'Clase media, familias de suburbio',
    score_txt: '80/100',
    color: '#ca8a04',
    colorFill: '#ca8a04',
    desc: 'Municipios en expansión con escasa oferta formal. Clientes que hoy viajan hasta Santiago a comprar. Costos mínimos de operación. Mercado casi virgen.',
    competidores: [],
    stats: [
      { label: 'Flujo vehicular', val: '65%' },
      { label: 'Costo arriendo', val: '$1.5–3M' },
      { label: 'Competidores formales', val: 'Ninguno' },
    ],
    ideal: false,
  },
  {
    id: 'F',
    name: 'Puente Alto / San Bernardo',
    sub: 'Av. Nos / Gran Avenida Sur',
    lat: -33.615, lng: -70.615,
    radius: 2600,
    score: 74,
    oportunidad: 'media',
    comp: 'Media',
    arriendo: '$4.5–7M',
    perfil: 'Clase media, alto volumen poblacional',
    score_txt: '74/100',
    color: '#dc2626',
    colorFill: '#dc2626',
    desc: 'Zona muy populosa pero con competencia ya instalada. Arriendos altos. Requiere diferenciación fuerte por precio, financiamiento o especialización en marcas.',
    competidores: [
      { name: 'Salco Automotora', rating: 3.9, reviews: 540, tag: 'Competencia activa', tagColor: '#ca8a04' },
      { name: 'Automotora Motorland', rating: 4.1, reviews: 330, tag: 'Usados populares', tagColor: '#ca8a04' },
      { name: 'Dercocenter PAlto', rating: 4.3, reviews: 1200, tag: 'Nuevos / fuerte', tagColor: '#dc2626' },
    ],
    stats: [
      { label: 'Flujo vehicular', val: '90%' },
      { label: 'Costo arriendo', val: '$4.5–7M' },
      { label: 'Competidores formales', val: '3+ activos' },
    ],
    ideal: false,
  },
];

// ══════════════════════════════════════════════
//  MAP
// ══════════════════════════════════════════════
const map = L.map('map', {
  center: [-33.48, -70.72],
  zoom: 11,
  zoomControl: false
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  maxZoom: 19
}).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);

const circleMap = {};
const labelMap = {};

function makeStars(r) {
  const full = Math.round(r);
  return Array.from({length:5}, (_,i) =>
    `<span style="color:${i<full?'#f59e0b':'#ccc'};font-size:10px">★</span>`
  ).join('');
}

ZONAS.forEach(z => {
  const circle = L.circle([z.lat, z.lng], {
    radius: z.radius,
    color: z.color,
    fillColor: z.colorFill,
    fillOpacity: 0.13,
    weight: 2,
    dashArray: z.oportunidad === 'alta' ? null : '6 4'
  }).addTo(map);

  circle.on('click', () => selectZona(z.id, true));
  circleMap[z.id] = circle;

  // Label marker
  const icon = L.divIcon({
    html: `<div style="
      background:${z.color};color:#fff;
      width:28px;height:28px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-family:Space Grotesk,sans-serif;font-size:13px;font-weight:700;
      box-shadow:0 3px 10px rgba(0,0,0,.25);
      border:2px solid #fff;
      cursor:pointer;
    ">${z.id}</div>`,
    className: '', iconSize: [28,28], iconAnchor: [14,14]
  });

  const marker = L.marker([z.lat, z.lng], { icon }).addTo(map);
  marker.on('click', () => { selectZona(z.id, true); map.panTo([z.lat, z.lng]); });
  labelMap[z.id] = marker;
});

// ══════════════════════════════════════════════
//  SIDEBAR RENDER
// ══════════════════════════════════════════════
let activeId = null;
let currentFilter = 'all';

function filteredZonas(filter, search) {
  return ZONAS.filter(z => {
    const ms = filter === 'all' ? true :
      filter === '91' ? z.score >= 80 :
      filter === 'baja' ? z.comp.toLowerCase().includes('baja') || z.comp.toLowerCase().includes('ninguno') :
      filter === 'media' ? z.comp.toLowerCase().includes('media') :
      filter === 'arriendo' ? z.arriendo.startsWith('$1') || z.arriendo.startsWith('$2') || z.arriendo.startsWith('$3') :
      true;
    const mt = !search || z.name.toLowerCase().includes(search) || z.sub.toLowerCase().includes(search);
    return ms && mt;
  });
}

function renderList(filter, search = '') {
  const list = document.getElementById('zonaList');
  const items = filteredZonas(filter, search);
  document.getElementById('countLbl').textContent = `${items.length} resultado${items.length !== 1 ? 's' : ''}`;

  list.innerHTML = items.flatMap(z => {
    const isActive = z.id === activeId;
    const scoreColor = z.score >= 85 ? '#16a34a' : z.score >= 78 ? '#ca8a04' : '#dc2626';
    const compColor = z.comp.toLowerCase().includes('baja') || z.comp.includes('Muy') ? '#16a34a' :
      z.comp.toLowerCase().includes('media') ? '#ca8a04' : '#dc2626';

    const compRows = z.competidores.length > 0
      ? z.competidores.map(c => `
          <div class="comp-row">
            <div class="comp-row-name">${c.name}</div>
            <div class="comp-row-right">
              <span class="comp-stars">${makeStars(c.rating)}</span>
              <span class="comp-rating">${c.rating}</span>
              <span class="comp-tag" style="background:${c.tagColor}18;color:${c.tagColor}">${c.tag}</span>
            </div>
          </div>`).join('')
      : `<div class="no-comp">✓ Sin competidores formales identificados</div>`;

    const statBoxes = z.stats.map(s => `
      <div class="stat-box">
        <div class="stat-num">${s.val}</div>
        <div class="stat-lbl">${s.label}</div>
      </div>`).join('');

    return [
      `<div class="zona-item${isActive ? ' active' : ''}" id="zi-${z.id}" onclick="selectZona('${z.id}')">
        <div class="zi-letter" style="background:${z.color}">${z.id}</div>
        <div class="zi-body">
          <div class="zi-name">${z.name}${z.ideal ? ' ⭐' : ''}</div>
          <div class="zi-addr">${z.sub}</div>
          <div class="zi-meta">
            <span class="score-badge" style="background:${scoreColor}18;color:${scoreColor}">Score ${z.score}</span>
            <span class="comp-badge" style="background:${compColor}15;color:${compColor}">Comp. ${z.comp}</span>
            <span style="font-size:11px;color:var(--muted)">${z.arriendo}/mes</span>
          </div>
          <div class="zi-actions">
            <button class="zi-btn" onclick="event.stopPropagation();flyTo('${z.id}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/></svg>
              Ver en mapa
            </button>
            <button class="zi-btn" onclick="event.stopPropagation();selectZona('${z.id}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
              ${isActive ? 'Ocultar detalle' : 'Ver detalle'}
            </button>
          </div>
        </div>
      </div>`,

      `<div class="zona-detail" id="zd-${z.id}" ${!isActive ? '' : ''}>
        <div class="detail-section">
          <div class="detail-desc">${z.desc}</div>
          <div class="stat-row">${statBoxes}</div>
        </div>
        <div class="detail-section">
          <div class="detail-title">Competencia en la zona</div>
          <div class="comp-list">${compRows}</div>
        </div>
      </div>`
    ];
  }).join('');
}

function flyTo(id) {
  const z = ZONAS.find(x => x.id === id);
  if (z) map.flyTo([z.lat, z.lng], 13, { duration: 1 });
}

function selectZona(id, fromMap = false) {
  const prev = activeId;
  activeId = prev === id ? null : id;

  renderList(currentFilter, document.getElementById('searchInput').value.toLowerCase());

  if (activeId) {
    const z = ZONAS.find(x => x.id === activeId);
    if (z) {
      if (!fromMap) flyTo(id);
      showPopup(z);
      // Scroll card into view
      setTimeout(() => {
        const el = document.getElementById(`zi-${id}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 80);
    }
  } else {
    closePopup();
  }
}

// ══════════════════════════════════════════════
//  MAP POPUP
// ══════════════════════════════════════════════
function showPopup(z) {
  const scoreColor = z.score >= 85 ? '#16a34a' : z.score >= 78 ? '#ca8a04' : '#dc2626';
  const compRows = z.competidores.length > 0
    ? z.competidores.map(c => `
        <div class="mp-stat">
          <span class="mp-sl">${c.name}</span>
          <span class="mp-sv" style="display:flex;align-items:center;gap:4px">
            <span style="color:#f59e0b;font-size:10px">${'★'.repeat(Math.round(c.rating))}</span>
            ${c.rating}
          </span>
        </div>`).join('')
    : `<div style="font-size:11px;color:#16a34a;padding:4px 0">✓ Sin competidores formales</div>`;

  document.getElementById('mp-content').innerHTML = `
    <div class="mp-letter" style="background:${z.color}">${z.id}</div>
    <div class="mp-name">${z.name}</div>
    <div class="mp-addr">${z.sub}</div>
    <div class="mp-stat"><span class="mp-sl">Score</span><span class="mp-sv" style="color:${scoreColor};font-weight:700">${z.score}/100</span></div>
    <div class="mp-stat"><span class="mp-sl">Arriendo estimado</span><span class="mp-sv">${z.arriendo}</span></div>
    <div class="mp-stat"><span class="mp-sl">Competencia</span><span class="mp-sv">${z.comp}</span></div>
    <div style="margin-top:6px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Competidores</div>
    ${compRows}
    <div class="mp-note">${z.desc}</div>`;

  document.getElementById('mapPopup').classList.add('vis');
}

function closePopup() {
  document.getElementById('mapPopup').classList.remove('vis');
}

// ══════════════════════════════════════════════
//  FILTERS + SEARCH
// ══════════════════════════════════════════════
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  btn.classList.add('on');
  activeId = null;
  closePopup();
  renderList(filter, document.getElementById('searchInput').value.toLowerCase());
}

document.getElementById('searchInput').addEventListener('input', e => {
  renderList(currentFilter, e.target.value.toLowerCase());
});

// ── INIT ──
renderList('all');
</script>
</body>
</html>
