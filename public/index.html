<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FunnelOS CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #2563eb;
  --accent-dark: #1d4ed8;
  --bg: #0b1220;
  --panel: #111827;
  --panel-2: #1f2937;
  --border: rgba(255,255,255,0.08);
  --text: #e5e7eb;
  --text-soft: #cbd5e1;
  --text-mute: #94a3b8;

  --signal-blue: #3b82f6;
  --signal-yellow: #f59e0b;
  --signal-blue-soft: rgba(59,130,246,0.15);
  --signal-yellow-soft: rgba(245,158,11,0.15);
}
* { box-sizing: border-box; margin:0; padding:0; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  min-height: 100vh;
}
.app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
.sidebar {
  background: var(--panel);
  border-right: 1px solid var(--border);
  padding: 20px 16px;
}
.sidebar h1 { font-size: 16px; margin-bottom: 24px; }
.sidebar nav button {
  width: 100%;
  text-align: left;
  background: transparent;
  border: none;
  color: var(--text-soft);
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 4px;
  font-size: 13.5px;
}
.sidebar nav button.active, .sidebar nav button:hover {
  background: var(--panel-2); color: #fff;
}
.main { padding: 24px; overflow-y: auto; }
.view { display: none; }
.view.active { display: block; }

.section-title { font-size: 18px; margin-bottom: 16px; font-weight: 600; }

/* ─── Lista de leads ─── */
.leads-table {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.leads-row {
  display: grid;
  grid-template-columns: 32px 1.4fr 1fr 1.2fr 1fr 1.4fr 90px;
  gap: 12px;
  padding: 14px 16px;
  align-items: center;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.leads-row.head {
  background: var(--panel-2);
  color: var(--text-mute);
  font-weight: 600;
  font-size: 11.5px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.leads-row:last-child { border-bottom: none; }

/* ─── SEMÁFORO (indicador BLUE / YELLOW) ─── */
.signal-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #374151;
  border: 2px solid #1f2937;
  position: relative;
}
.signal-dot.blue {
  background: var(--signal-blue);
  box-shadow: 0 0 10px var(--signal-blue);
  animation: pulseSignal 1.6s infinite;
}
.signal-dot.yellow {
  background: var(--signal-yellow);
  box-shadow: 0 0 10px var(--signal-yellow);
  animation: pulseSignal 1.6s infinite;
}
@keyframes pulseSignal {
  0%,100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.18); opacity: 0.85; }
}

.signal-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
}
.signal-badge.blue { background: var(--signal-blue-soft); color: var(--signal-blue); }
.signal-badge.yellow { background: var(--signal-yellow-soft); color: var(--signal-yellow); }
.signal-badge.none { background: rgba(148,163,184,0.12); color: var(--text-mute); }

.status-pill {
  font-size: 11.5px;
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--panel-2);
  color: var(--text-soft);
  white-space: nowrap;
}
.status-pill.qualified {
  background: linear-gradient(90deg, var(--signal-blue-soft), var(--signal-yellow-soft));
  color: #fff;
  font-weight: 600;
}

/* ─── Kanban ─── */
.kanban {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: 280px;
  gap: 14px;
  overflow-x: auto;
  padding-bottom: 12px;
}
.kanban-col {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - 140px);
}
.kanban-col h3 {
  font-size: 12.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--text-mute);
  padding: 14px 14px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.kanban-col h3 .count {
  background: var(--panel-2);
  color: var(--text-soft);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 999px;
}
.kanban-col.qualified-col h3 {
  background: linear-gradient(90deg, var(--signal-blue-soft), var(--signal-yellow-soft));
  color: #fff;
}
.kanban-cards {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.kanban-card {
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  position: relative;
  cursor: pointer;
  transition: border-color 0.2s;
}
.kanban-card:hover { border-color: rgba(255,255,255,0.18); }
.kanban-card .card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.kanban-card .name { font-weight: 600; font-size: 13px; }
.kanban-card .interest {
  font-size: 12px;
  color: var(--text-mute);
  margin-bottom: 8px;
}
.kanban-card .card-foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--text-mute);
}
.kanban-card.signal-blue { border-left: 3px solid var(--signal-blue); }
.kanban-card.signal-yellow { border-left: 3px solid var(--signal-yellow); }

.empty-col {
  padding: 20px;
  text-align: center;
  color: var(--text-mute);
  font-size: 12px;
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h1>FunnelOS CRM</h1>
    <nav>
      <button class="active" data-view="leads">📋 Leads</button>
      <button data-view="kanban">📊 Pipeline</button>
    </nav>
  </aside>

  <main class="main">
    <section id="view-leads" class="view active">
      <div class="section-title">Leads</div>
      <div class="leads-table" id="leadsTable"></div>
    </section>

    <section id="view-kanban" class="view">
      <div class="section-title">Pipeline Kanban</div>
      <div class="kanban" id="kanban"></div>
    </section>
  </main>
</div>

<script>
const TENANT = 'demo_automotora';
const HEADERS = { 'X-Tenant-Id': TENANT, 'X-User': 'gerente', 'Content-Type': 'application/json' };
let leads = [];
let stages = [];

const escapeHTML = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function signalDot(sig) {
  const cls = sig === 'BLUE' ? 'blue' : sig === 'YELLOW' ? 'yellow' : '';
  return `<div class="signal-dot ${cls}" title="${sig || 'NONE'}"></div>`;
}
function signalBadge(sig) {
  if (sig === 'BLUE') return '<span class="signal-badge blue">🔵 Agenda firme</span>';
  if (sig === 'YELLOW') return '<span class="signal-badge yellow">🟡 Tibio</span>';
  return '<span class="signal-badge none">—</span>';
}
function statusPill(status) {
  const isQ = status === 'Lead Calificado - Contacto Agendado';
  return `<span class="status-pill ${isQ ? 'qualified' : ''}">${escapeHTML(status)}</span>`;
}

async function loadConfig() {
  const r = await fetch('/api/config?tenant=' + TENANT);
  const cfg = await r.json();
  stages = cfg.stages || ['Nuevo','En Proceso','Lead Calificado - Contacto Agendado','Agendado','Seguimiento','Cerrado','Abandonado'];
  if (cfg.accentColor) document.documentElement.style.setProperty('--accent', cfg.accentColor);
}

async function loadLeads() {
  const r = await fetch('/api/leads', { headers: HEADERS });
  leads = await r.json();
  renderLeads();
  renderKanban();
}

function renderLeads() {
  const html = [`
    <div class="leads-row head">
      <div></div>
      <div>Nombre</div>
      <div>Teléfono</div>
      <div>Interés</div>
      <div>Origen</div>
      <div>Estado</div>
      <div>Señal</div>
    </div>
  `];
  if (!leads.length) {
    html.push('<div class="empty-col">Sin leads aún.</div>');
  } else {
    leads.forEach(l => {
      const sig = l.intentSignal || 'NONE';
      html.push(`
        <div class="leads-row">
          ${signalDot(sig)}
          <div><strong>${escapeHTML(l.name)}</strong></div>
          <div>${escapeHTML(l.phone || '—')}</div>
          <div>${escapeHTML(l.interest || '—')}</div>
          <div>${escapeHTML(l.source || '—')}</div>
          <div>${statusPill(l.status)}</div>
          <div>${signalBadge(sig)}</div>
        </div>
      `);
    });
  }
  document.getElementById('leadsTable').innerHTML = html.join('');
}

function renderKanban() {
  const wrap = document.getElementById('kanban');
  const grouped = {};
  stages.forEach(s => grouped[s] = []);
  leads.forEach(l => {
    if (!grouped[l.status]) grouped[l.status] = [];
    grouped[l.status].push(l);
  });

  wrap.innerHTML = stages.map(stage => {
    const items = grouped[stage] || [];
    const isQ = stage === 'Lead Calificado - Contacto Agendado';
    return `
      <div class="kanban-col ${isQ ? 'qualified-col' : ''}">
        <h3>${escapeHTML(stage)} <span class="count">${items.length}</span></h3>
        <div class="kanban-cards">
          ${items.length ? items.map(l => {
            const sig = l.intentSignal || 'NONE';
            const sigClass = sig === 'BLUE' ? 'signal-blue' : sig === 'YELLOW' ? 'signal-yellow' : '';
            return `
              <div class="kanban-card ${sigClass}">
                <div class="card-top">
                  <span class="name">${escapeHTML(l.name)}</span>
                  ${signalDot(sig)}
                </div>
                <div class="interest">${escapeHTML(l.interest || '—')}</div>
                <div class="card-foot">
                  <span>${escapeHTML(l.source || '—')}</span>
                  ${signalBadge(sig)}
                </div>
              </div>
            `;
          }).join('') : '<div class="empty-col">Vacío</div>'}
        </div>
      </div>
    `;
  }).join('');
}

document.querySelectorAll('.sidebar nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sidebar nav button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-' + btn.dataset.view).classList.add('active');
  });
});

(async () => {
  await loadConfig();
  await loadLeads();
  setInterval(loadLeads, 8000);
})();
</script>
</body>
</html>
