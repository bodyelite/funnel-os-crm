name: Sync RMG Inventory
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and push inventory
        run: |
          node << 'JS'
          const https = require('https');
          const url = 'https://rmgautos.cl/usados/';
          https.get(url, {headers:{'User-Agent':'Mozilla/5.0 Chrome/124.0.0.0'}}, res => {
            let html = '';
            res.on('data', d => html += d);
            res.on('end', () => {
              const MARCAS = ['CHANGAN','SUZUKI','RAM','PEUGEOT','OPEL','KIA','CHERY','VOLKSWAGEN','HONDA','SSANGYONG','FORD','HYUNDAI','TOYOTA','BMW','MG','KARRY','NISSAN','ALFA'];
              const inv = [];
              const linkRE = /href="(https:\/\/rmgautos\.cl\/product\/[^"]+)"/g;
              const cards = html.split('href="https://rmgautos.cl/product/').slice(1);
              // Extraer por bloque de tarjeta
              const bloqueRE = /\$(\d{1,2}\.\d{3}\.\d{3})/g;
              cards.forEach((c, i) => {
                const link = 'https://rmgautos.cl/product/' + c.split('"')[0];
                const plain = c.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ');
                const precios = [...plain.matchAll(/\$(\d{1,2}\.\d{3}\.\d{3})/g)].map(m=>parseInt(m[1].replace(/\./g,'')));
                const vendido = /VENDIDO/i.test(plain);
                const price = vendido ? 0 : (precios[0]||0);
                const yearM = plain.match(/\b(201\d|202[0-5])\b/);
                const year = yearM ? parseInt(yearM[0]) : null;
                let brand = '', modelName = '';
                for(const m of MARCAS) { if(plain.toUpperCase().includes(m)) { brand=m; break; } }
                if(!brand || !price) return;
                const kmM = plain.match(/\b(\d{1,3})\.(\d{3})\b/g);
                let km = '';
                if(kmM) for(const k of kmM) { const v=parseInt(k.replace(/\./g,'')); if(v>500&&v<999999&&String(v)!==String(year)){km=v.toLocaleString('es-CL')+' km';break;} }
                inv.push({id:'WEB-'+inv.length,brand,model:brand,year,price,km,stock:vendido?0:1,link,highlights:km+(vendido?' | VENDIDO':'')});
              });
              if(inv.length === 0){console.log('0 autos - Cloudflare bloqueó');process.exit(0);}
              const body = JSON.stringify(inv);
              const req = https.request('https://body-elite-giftcards.onrender.com/api/inventory/push?tenant=demo_automotora',{method:'POST',headers:{'Content-Type':'application/json','x-push-key':'rmg2025push','Content-Length':Buffer.byteLength(body)}},r=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>console.log('Sync OK:',d));});
              req.write(body);req.end();
            });
          }).on('error',e=>console.error(e));
          JS
